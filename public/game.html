<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abdullah games | اللعبة</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #020617;
      color: #f8fafc;
    }

    .wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1rem;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    a { color: #22d3ee; text-decoration: none; }

    iframe {
      width: 100%;
      min-height: 70vh;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <div class="top">
      <h1 id="title">...</h1>
      <a href="/">← الرجوع لصفحة الألعاب</a>
    </div>
    <iframe id="gameFrame" title="game frame"></iframe>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    async function loadGame() {
      const response = await fetch(`/api/games/${slug}`);

      if (!response.ok) {
        document.getElementById('title').textContent = 'اللعبة غير موجودة';
        return;
      }

      const game = await response.json();
      document.getElementById('title').textContent = game.name;
      document.getElementById('gameFrame').src = game.path;
    }

    loadGame();
  </script>
</body>
</html>
