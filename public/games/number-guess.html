<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تخمين الرقم</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 1rem; }
    input, button { padding: 0.5rem; margin: 0.3rem 0; }
  </style>
</head>
<body>
  <h2>لعبة تخمين الرقم (1 - 20)</h2>
  <p>حاول معرفة الرقم السري.</p>
  <input id="guess" type="number" min="1" max="20" />
  <button onclick="checkGuess()">تحقق</button>
  <p id="result"></p>

  <script>
    const secret = Math.floor(Math.random() * 20) + 1;
    let attempts = 0;

    function checkGuess() {
      const value = Number(document.getElementById('guess').value);
      attempts++;

      if (!value) return;

      if (value === secret) {
        document.getElementById('result').textContent = `ممتاز! الرقم الصحيح ${secret} بعد ${attempts} محاولات.`;
      } else if (value < secret) {
        document.getElementById('result').textContent = 'أكبر شوي 👆';
      } else {
        document.getElementById('result').textContent = 'أصغر شوي 👇';
      }
    }
  </script>
</body>
</html>
