<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحدي السرعة</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 1rem; }
    #clickBtn {
      padding: 1rem 1.4rem;
      font-size: 1.1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>تحدي السرعة - 10 ثواني</h2>
  <p>اضغط "ابدأ" ثم اضغط الزر بسرعة.</p>
  <button onclick="startGame()">ابدأ</button>
  <button id="clickBtn" onclick="clickCount()" disabled>اضغطني</button>
  <p id="timer">الوقت: 10</p>
  <p id="score">النقاط: 0</p>

  <script>
    let count = 0;
    let time = 10;
    let interval = null;

    function startGame() {
      count = 0;
      time = 10;
      document.getElementById('score').textContent = 'النقاط: 0';
      document.getElementById('timer').textContent = 'الوقت: 10';
      document.getElementById('clickBtn').disabled = false;
      clearInterval(interval);

      interval = setInterval(() => {
        time--;
        document.getElementById('timer').textContent = `الوقت: ${time}`;

        if (time <= 0) {
          clearInterval(interval);
          document.getElementById('clickBtn').disabled = true;
          document.getElementById('timer').textContent = `انتهى الوقت! نتيجتك: ${count}`;
        }
      }, 1000);
    }

    function clickCount() {
      if (time > 0) {
        count++;
        document.getElementById('score').textContent = `النقاط: ${count}`;
      }
    }
  </script>
</body>
</html>
